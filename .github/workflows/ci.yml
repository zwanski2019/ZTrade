name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # No `version:` — it is read from package.json `packageManager`.
      # Specifying both makes the action fail with "Multiple versions of pnpm".
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm --filter @ztrade/web build

  gates:
    name: Ship gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      # No `version:` — it is read from package.json `packageManager`.
      # Specifying both makes the action fail with "Multiple versions of pnpm".
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Gate #7. If this is red, every backtest number in the repo is fiction.
      - name: 'Gate #7 — backtest/live parity'
        run: pnpm gate:parity

      # Gate #5. Boots the real server with sentinel credentials and fails if
      # one appears in logs or any HTTP response body.
      - name: 'Gate #5 — secret leak scan'
        run: pnpm gate:secrets

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # No `version:` — it is read from package.json `packageManager`.
      # Specifying both makes the action fail with "Multiple versions of pnpm".
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # A trading bot is a juicy dependency-confusion target.
      - name: Audit
        run: pnpm audit --audit-level high
        continue-on-error: true
